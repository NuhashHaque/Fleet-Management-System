# Mosquitto 2.x requires explicit listener + allow_anonymous

# Standard MQTT TCP (used by simulator & dashboard containers)
listener 1883
allow_anonymous true

# MQTT over WebSocket (used by the Next.js browser client)
listener 9001
protocol websockets
allow_anonymous true

# Persistence: survive container restart
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information
