global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/alert.rules.yml

scrape_configs:
  - job_name: fastapi-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["fastapi-gateway:8000"]

  - job_name: mqtt-to-kafka-bridge
    static_configs:
      - targets: ["mqtt-to-kafka-bridge:9101"]

  - job_name: kafka-to-mqtt-bridge
    static_configs:
      - targets: ["kafka-to-mqtt-bridge:9102"]

  - job_name: timescaledb-audit-etl
    static_configs:
      - targets: ["timescaledb-audit-etl:9103"]

  - job_name: timescaledb-telemetry-etl
    static_configs:
      - targets: ["timescaledb-telemetry-etl:9104"]

  - job_name: timescaledb-event-etl
    static_configs:
      - targets: ["timescaledb-event-etl:9105"]
